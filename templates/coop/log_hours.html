{% extends "base.html" %}

{% block title %}Log Hours — The Coop{% endblock %}

{% block content %}
<div class="stack stack--lg">
  <div class="row row--between">
    <h1 class="page-title">Log Hours</h1>
    <a href="{% url 'coop:hours' %}" class="btn btn--secondary">Back to Hours</a>
  </div>

  <div class="card" style="max-width: 32rem;">
    {% load coop_tags %}
    <div
      data-svelte-component="LogHoursForm"
      data-prop-jobs='{% jobs_json %}'
      data-prop-csrfToken="{{ csrf_token }}"
      data-prop-isAdmin="{% if member.role == 'admin' %}true{% else %}false{% endif %}"
      data-prop-otherMembers='{% other_members_json other_members %}'
    ></div>
  </div>
</div>
{% endblock %}
